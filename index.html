<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación a Mis 15</title>
    
    <!-- Open Graph / WhatsApp -->
    <meta property="og:title" content="💖 More cumple 15 años">
    <meta property="og:description" content="Te esperamos para celebrar una noche inolvidable.">
    <meta property="og:image" content="https://moremis15.github.io/Invitacion/img.jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Invitación a los 15 años de More">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:url" content="https://moremis15.github.io/Invitacion/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Invitación 15 Años">
    <link rel="image_src" href="https://moremis15.github.io/Invitacion/img.jpeg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e27;
            font-family: 'Lato', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ============ BACKGROUND ============ */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 50%, #0d1442 0%, #070a1a 100%);
            z-index: 0;
        }

        /* Bokeh layers */
        .bokeh-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .bokeh {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180,210,255,0.15) 0%, transparent 70%);
            animation: floatBokeh linear infinite;
        }

        @keyframes floatBokeh {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Stars */
        .star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            z-index: 1;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Sparkles floating */
        .sparkle-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 0 6px 2px rgba(255,215,0,0.4);
            animation: sparkleFloat linear infinite;
        }

        @keyframes sparkleFloat {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 1; transform: scale(1); }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(0); opacity: 0; }
        }

        /* ============ CONTAINER ============ */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            transition: all 1.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ============ HINT ============ */
        .hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(180,210,255,0.6);
            font-size: 14px;
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            letter-spacing: 2px;
            transition: opacity 0.8s;
            text-shadow: 0 0 20px rgba(100,150,255,0.3);
            animation: pulseHint 2.5s ease-in-out infinite;
            z-index: 15;
        }

        .hint.hidden { opacity: 0; pointer-events: none; }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ============ LIGHT BEAM ============ */
        .light-beam {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            width: 300px;
            height: 0;
            z-index: 3;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease-out, height 1.5s ease-out;
            background: linear-gradient(180deg, 
                rgba(255,215,0,0.12) 0%,
                rgba(255,200,100,0.06) 40%,
                rgba(255,215,0,0.02) 70%,
                transparent 100%
            );
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            filter: blur(8px);
        }

        .container.open .light-beam {
            height: 420px;
            opacity: 1;
        }

        /* ============ ENVELOPE ============ */
        .envelope-wrapper {
            position: fixed;
            width: 540px;
            height: 430px;
            cursor: pointer;
            perspective: 1200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            transition: all 1.8s cubic-bezier(0.22, 1, 0.36, 1);
            animation: envelopeFloat 3s ease-in-out infinite;
        }

        /* Glow behind envelope */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(ellipse at 50% 50%, rgba(100,150,255,0.3) 0%, rgba(201,168,76,0.15) 40%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes envelopeFloat {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
            25% { transform: translate(-50%, -50%) translateY(-8px) rotate(1deg); }
            50% { transform: translate(-50%, -50%) translateY(-3px) rotate(0deg); }
            75% { transform: translate(-50%, -50%) translateY(-10px) rotate(-1deg); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .envelope-wrapper:hover {
            animation-play-state: paused;
        }

        .container.open .envelope-wrapper {
            top: calc(100% - 160px);
            transform: translate(-50%, 0);
            animation: none;
        }

        .container.open .envelope-wrapper::before {
            opacity: 0;
            transition: opacity 1.5s;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            background-image: url('sobre.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.3s ease-in;
        }

        .envelope.open {
            background-image: url('sobre_abierto.png');
        }

        /* Envelope interior glow */
        .envelope-glow {
            position: absolute;
            inset: -20px;
            border-radius: 20px;
            background: radial-gradient(ellipse at 50% 60%, rgba(255,215,0,0.08) 0%, transparent 70%);
            z-index: 0;
            transition: opacity 1.5s;
            opacity: 0;
            pointer-events: none;
        }

        .envelope.open .envelope-glow { opacity: 1; }

        /* Back interior */
        .envelope-back {
            position: absolute;
            inset: 0;
            background: transparent;
            border-radius: 8px;
            z-index: 1;
            box-shadow: none;
        }

        /* Interior light flash */
        .interior-light {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 60%, rgba(255,215,0,0.6) 0%, rgba(255,200,100,0.2) 40%, transparent 70%);
            transition: opacity 1.2s ease-out;
        }

        .envelope.open .interior-light { opacity: 1; }

        /* Envelope body */
        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 82%;
            background: transparent;
            border-radius: 0 0 8px 8px;
            z-index: 4;
            border: none;
            box-shadow: none;
        }

        .envelope-body::before {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 0 0 6px 6px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Satin sheen */
        .envelope-body::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
            transform: skewX(-20deg);
            pointer-events: none;
            animation: sheenMove 4s ease-in-out infinite;
        }

        @keyframes sheenMove {
            0%, 100% { transform: translateX(-30%) skewX(-20deg); }
            50% { transform: translateX(30%) skewX(-20deg); }
        }

        /* Bottom flap */
        .flap-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 28px;
            background: transparent;
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            z-index: 3;
            border-radius: 0 0 8px 8px;
        }

        /* Top flap */
        .flap-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            clip-path: polygon(0 84%, 50% 38%, 100% 84%, 100% 0, 0 0);
            z-index: 6;
            transform-origin: top center;
            transition: transform 1.6s cubic-bezier(0.22, 1, 0.36, 1);
            border-radius: 8px 8px 0 0;
            box-shadow: none;
        }

        .flap-top::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            clip-path: polygon(0 84%, 50% 38%, 100% 84%, 100% 0, 0 0);
            pointer-events: none;
        }

        .envelope.open .flap-top {
            transform: rotateX(-180deg);
            z-index: 1;
        }

        /* Sides */
        .envelope-side {
            position: absolute;
            top: 0;
            width: 1.5px;
            height: 82%;
            background: linear-gradient(180deg, rgba(180,210,255,0.4), rgba(180,210,255,0.1));
            z-index: 5;
        }
        .envelope-side.left { left: 0; }
        .envelope-side.right { right: 0; }

        /* ============ LETTER WRAPPER (centered on screen) ============ */
        .letter-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: all 1.8s cubic-bezier(0.22, 1, 0.36, 1);
            width: 380px;
            max-width: 85vw;
            display: block;
        }

        .container.open .letter-wrapper,
        .letter-wrapper.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .letter {
            width: 100%;
            aspect-ratio: 3 / 4;
            max-height: 70vh;
            border-radius: 6px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.4),
                0 0 80px rgba(100,150,255,0.08),
                0 0 40px rgba(255,215,0,0.3);
            border: 1px solid rgba(180,210,255,0.12);
            position: relative;
            overflow: visible;
            background-image: url('carta.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
        }
        
        .letter img {
            display: none;
        }

        /* Light reflection overlay on letter */
        .light-reflection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease-out;
            background: radial-gradient(
                ellipse at 50% 0%,
                rgba(255,215,0,0.18) 0%,
                rgba(255,200,100,0.06) 30%,
                transparent 60%
            );
            border-radius: 6px;
            mix-blend-mode: overlay;
        }

        .container.open .light-reflection {
            opacity: 1;
        }

        /* Card decorative corners */
        .letter .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0.35;
            z-index: 1;
        }
        .letter .corner.tl { top: 6px; left: 6px; border-top: 1.5px solid #6b8db5; border-left: 1.5px solid #6b8db5; border-radius: 2px 0 0 0; }
        .letter .corner.tr { top: 6px; right: 6px; border-top: 1.5px solid #6b8db5; border-right: 1.5px solid #6b8db5; border-radius: 0 2px 0 0; }
        .letter .corner.bl { bottom: 6px; left: 6px; border-bottom: 1.5px solid #6b8db5; border-left: 1.5px solid #6b8db5; border-radius: 0 0 0 2px; }
        .letter .corner.br { bottom: 6px; right: 6px; border-bottom: 1.5px solid #6b8db5; border-right: 1.5px solid #6b8db5; border-radius: 0 0 2px 0; }

        /* Watercolor flowers */
        .letter .flower-deco {
            position: absolute;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .flower-deco.f1 { top: -4px; left: -6px; width: 70px; height: 70px; background: radial-gradient(circle at 50% 50%, #6b8db5 0%, transparent 70%); border-radius: 50%; filter: blur(8px); }
        .flower-deco.f2 { bottom: -4px; right: -6px; width: 60px; height: 60px; background: radial-gradient(circle at 50% 50%, #7da0c8 0%, transparent 70%); border-radius: 50%; filter: blur(6px); }
        .flower-deco.f3 { top: 40%; left: -2px; width: 36px; height: 36px; background: radial-gradient(circle at 50% 50%, #c9a84c 0%, transparent 70%); border-radius: 50%; filter: blur(10px); opacity: 0.1; }
        .flower-deco.f4 { top: 30%; right: -2px; width: 40px; height: 40px; background: radial-gradient(circle at 50% 50%, #6b8db5 0%, transparent 70%); border-radius: 50%; filter: blur(8px); opacity: 0.12; }

        /* Letter content */
        .letter-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .letter .hearts {
            font-size: 14px;
            color: #6b8db5;
            letter-spacing: 8px;
            margin-bottom: 8px;
            opacity: 0.4;
            text-align: center;
        }

        .letter h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 32px;
            color: #1a2a5e;
            font-weight: 400;
            margin-bottom: 4px;
            text-align: center;
            line-height: 1.2;
            text-shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        .letter .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 12px;
            color: #6b8db5;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 400;
        }

        .letter .divider {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a84c, transparent);
            margin: 6px auto 10px;
            opacity: 0.5;
        }

        .letter p {
            font-size: 12px;
            color: #555;
            line-height: 1.8;
            text-align: center;
            font-weight: 300;
        }

        .letter p strong {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            color: #1a2a5e;
            font-size: 13px;
        }

        .letter .event-details {
            margin: 8px auto 0;
            padding: 8px 16px;
            background: rgba(107,141,181,0.05);
            border-radius: 4px;
            border-left: 2px solid rgba(201,168,76,0.3);
            border-right: 2px solid rgba(201,168,76,0.3);
            display: inline-block;
            width: auto;
            text-align: center;
        }

        .letter .event-details p {
            font-size: 11px;
            color: #666;
            line-height: 1.7;
        }

        .letter .date-sign {
            font-family: 'Great Vibes', cursive;
            font-size: 20px;
            color: #6b8db5;
            margin-top: 6px;
            opacity: 0.7;
            text-align: center;
        }

        /* ============ BUTTERFLIES ============ */
        .butterfly-container {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
        }

        .butterfly {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0;
            transition: opacity 1s;
            background-image: url('mariposa.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            animation: butterflyFloat 4s ease-in-out infinite, butterflyFlap 0.4s ease-in-out infinite;
        }

        .butterfly.show { opacity: 0.9; }

        @keyframes butterflyFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            50% { transform: translateY(-5px) rotate(-3deg); }
            75% { transform: translateY(-20px) rotate(3deg); }
        }

        @keyframes butterflyFlap {
            0%, 100% { transform: scaleX(1); }
            50% { transform: scaleX(0.3); }
        }

        /* ============ FAIRY ============ */
        .fairy-container {
            position: fixed;
            bottom: 60px;
            right: 60px;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s;
        }

        .fairy-container.show { opacity: 1; }

        .fairy {
            position: relative;
            width: 40px;
            height: 50px;
        }

        .fairy-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 22px;
            background: radial-gradient(ellipse at 50% 30%, rgba(180,210,255,0.5), rgba(100,150,220,0.2));
            border-radius: 50% 50% 40% 40%;
            filter: blur(0.5px);
        }

        .fairy-wings {
            position: absolute;
            bottom: 12px;
            width: 20px;
            height: 16px;
            background: rgba(180,210,255,0.15);
            border-radius: 50% 50% 0 0;
            filter: blur(1px);
            animation: wingsFlap 0.3s ease-in-out infinite alternate;
        }

        .fairy-wings.left { left: -10px; transform-origin: right center; }
        .fairy-wings.right { right: -10px; transform-origin: left center; }

        @keyframes wingsFlap {
            0% { transform: scaleY(1) rotate(0deg); opacity: 0.4; }
            100% { transform: scaleY(0.4) rotate(5deg); opacity: 0.8; }
        }

        .fairy-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: fairyPulse 2s ease-in-out infinite;
        }

        @keyframes fairyPulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
            50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
        }

        /* Fairy dust trail */
        .fairy-dust {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,215,0,0.4);
            animation: dustFloat 1.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes dustFloat {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(-20px, -30px) scale(0); opacity: 0; }
        }

        /* ============ PARTICLE BURST ============ */
        .particle-burst-container {
            position: fixed;
            inset: 0;
            z-index: 12;
            pointer-events: none;
        }

        .burst-particle {
            position: absolute;
            border-radius: 50%;
            animation: burstMove 2.5s ease-out forwards;
        }

        @keyframes burstMove {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* ============ MAGIC STARS FROM LETTER ============ */
        .magic-stars-container {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
        }

        .magic-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9;
            box-shadow: 0 0 6px 2px rgba(255,215,0,0.6);
            animation: starBurst 2s ease-out forwards;
        }

        @keyframes starBurst {
            0% { 
                transform: translate(0, 0) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translate(var(--sx), var(--sy)) scale(0); 
                opacity: 0; 
            }
        }

        /* ============ MUSIC BUTTON ============ */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(180,210,255,0.2);
            color: rgba(180,210,255,0.5);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .music-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(180,210,255,0.4);
            color: rgba(180,210,255,0.8);
        }

        /* ============ RESET BUTTON ============ */
        .reset-btn {
            margin-top: 16px;
            padding: 10px 28px;
            background: linear-gradient(135deg, rgba(107,141,181,0.2), rgba(201,168,76,0.15));
            color: rgba(180,210,255,0.7);
            border: 1px solid rgba(180,210,255,0.15);
            border-radius: 25px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s, all 0.3s;
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .reset-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .reset-btn:hover {
            background: linear-gradient(135deg, rgba(107,141,181,0.3), rgba(201,168,76,0.25));
            border-color: rgba(180,210,255,0.3);
            color: rgba(180,210,255,0.9);
            box-shadow: 0 0 20px rgba(201,168,76,0.1);
        }

        /* ============ WHATSAPP BUTTON ============ */
        .whatsapp-btn {
            display: block;
            width: 100%;
            max-width: 280px;
            margin: 20px auto 0;
            padding: 14px 28px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: all 0.3s;
            font-family: 'Lato', sans-serif;
            opacity: 0;
            pointer-events: none;
            animation: pulseWhatsApp 2s ease-in-out infinite;
        }

        .whatsapp-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(37, 211, 102, 0.5);
            background: linear-gradient(135deg, #25D366 0%, #075E54 100%);
        }

        @keyframes pulseWhatsApp {
            0%, 100% { box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(37, 211, 102, 0.6); }
        }

        /* ============ MAPS BUTTON ============ */
        .maps-btn {
            display: block;
            width: 100%;
            max-width: 280px;
            margin: 12px auto 0;
            padding: 14px 28px;
            background: linear-gradient(135deg, #4285F4 0%, #34A853 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
            transition: all 0.3s;
            font-family: 'Lato', sans-serif;
            opacity: 0;
            pointer-events: none;
            animation: pulseMaps 2s ease-in-out infinite;
        }

        .maps-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .maps-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(66, 133, 244, 0.5);
            background: linear-gradient(135deg, #4285F4 0%, #1A73E8 100%);
        }

        @keyframes pulseMaps {
            0%, 100% { box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(66, 133, 244, 0.6); }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 480px) {
            .envelope-wrapper { width: 300px; height: 240px; }
            .letter-wrapper { width: 280px; }
            .letter { padding: 14px 12px; }
            .letter h2 { font-size: 24px; }
            .letter p { font-size: 11px; }
            .letter .event-details p { font-size: 10px; }
            .fairy-container { right: 20px; bottom: 30px; }
            .fairy { transform: scale(0.7); }
            .hint { font-size: 12px; bottom: 60px; }
            .butterfly { width: 30px; height: 30px; }
            .whatsapp-btn { 
                max-width: 240px; 
                font-size: 12px; 
                padding: 12px 24px;
            }
            .reset-btn { 
                font-size: 11px; 
                padding: 8px 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Background gradient -->
    <div class="bg-gradient"></div>

    <!-- Bokeh layer -->
    <div class="bokeh-layer" id="bokehLayer"></div>

    <!-- Stars -->
    <div id="starsContainer"></div>

    <!-- Sparkle particles -->
    <div id="sparkleContainer"></div>

    <!-- Butterfly container -->
    <div class="butterfly-container" id="butterflyContainer"></div>

    <!-- Particle burst container -->
    <div class="particle-burst-container" id="burstContainer"></div>

    <!-- Magic stars container -->
    <div class="magic-stars-container" id="magicStarsContainer"></div>

    <!-- Fairy -->
    <div class="fairy-container" id="fairyContainer">
        <div class="fairy">
            <div class="fairy-wings left"></div>
            <div class="fairy-wings right"></div>
            <div class="fairy-body"></div>
            <div class="fairy-glow"></div>
        </div>
    </div>

        <!-- Music button -->
        <button class="music-btn" id="musicBtn" title="Alternar música">♪</button>

        <!-- Audio element for background music -->
        <audio id="bgMusic" loop preload="auto">
            <source src="cancion.mp3" type="audio/mpeg">
        </audio>

        <!-- Light beam -->
        <div class="light-beam"></div>

        <!-- Main container -->
        <div class="container" id="container">
            
            <!-- Letter wrapper (centered on screen) -->
            <div class="letter-wrapper" id="letterWrapper">
                <div class="letter" id="letter">
                    <div class="light-reflection"></div>
                </div>
                <!-- WhatsApp button -->
                <a href="https://wa.me/5491162351588?text=Hola!%20Confirmo%20mi%20asistencia%20a%20la%20invitación" 
                   target="_blank" 
                   rel="noopener noreferrer"
                   class="whatsapp-btn"
                   id="whatsappBtn">
                    CONFIRMAR ASISTENCIA
                </a>
                
                <!-- Maps button -->
                <a href="https://www.google.com/maps?q=-34.85999728642896,-58.52792212643832" 
                   target="_blank" 
                   rel="noopener noreferrer"
                   class="maps-btn"
                   id="mapsBtn">
                    IR A MAPS
                </a>
            </div>
            <div class="envelope-wrapper">
                <div class="envelope" id="envelope">
                    <div class="envelope-glow"></div>
                    <div class="envelope-back"></div>
                    <div class="interior-light"></div>

                    <div class="envelope-body"></div>
                    <div class="envelope-side left"></div>
                    <div class="envelope-side right"></div>
                    <div class="flap-bottom"></div>
                    <div class="flap-top"></div>
                </div>
            </div>

            <span class="hint" id="hint">✦ Toca el sobre para abrir ✦</span>
            <button class="reset-btn" id="resetBtn">✦ Cerrar invitación</button>
        </div>

    <script>
        // =============================================
        // STARS
        // =============================================
        (function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(star);
            }
        })();

        // =============================================
        // BOKEH
        // =============================================
        (function createBokeh() {
            const layer = document.getElementById('bokehLayer');
            for (let i = 0; i < 20; i++) {
                const b = document.createElement('div');
                b.className = 'bokeh';
                const size = Math.random() * 80 + 30;
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.animationDelay = (Math.random() * 15) + 's';
                b.style.animationDuration = (Math.random() * 10 + 12) + 's';
                layer.appendChild(b);
            }
        })();

        // =============================================
        // SPARKLES FLOATING
        // =============================================
        (function createSparkles() {
            const container = document.getElementById('sparkleContainer');
            for (let i = 0; i < 15; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle-particle';
                s.style.left = Math.random() * 100 + '%';
                s.style.width = s.style.height = (Math.random() * 4 + 2) + 'px';
                s.style.animationDelay = (Math.random() * 20) + 's';
                s.style.animationDuration = (Math.random() * 8 + 10) + 's';
                s.style.opacity = '0';
                container.appendChild(s);
            }
        })();

        // =============================================
        // MAIN INTERACTION
        // =============================================
        const container = document.getElementById('container');
        const envelope = document.getElementById('envelope');
        const hint = document.getElementById('hint');
        const resetBtn = document.getElementById('resetBtn');
        const butterflyContainer = document.getElementById('butterflyContainer');
        const burstContainer = document.getElementById('burstContainer');
        const magicStarsContainer = document.getElementById('magicStarsContainer');
        const fairyContainer = document.getElementById('fairyContainer');
        const letterWrapper = document.getElementById('letterWrapper');
        let isOpen = false;
        let audioCtx = null;
        let isMusicPlaying = false;

        // =============================================
        // AUDIO (Background music)
        // =============================================
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        
        bgMusic.volume = 0.3;

        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                isMusicPlaying = true;
                musicBtn.textContent = '♫';
            } else {
                bgMusic.pause();
                isMusicPlaying = false;
                musicBtn.textContent = '♪';
            }
        });

        // =============================================
        // BUTTERFLIES
        // =============================================
        function createButterflies() {
            const positions = [
                { x: 15, y: 30 }, { x: 75, y: 20 }, { x: 60, y: 50 },
                { x: 30, y: 60 }, { x: 85, y: 55 }, { x: 45, y: 15 },
                { x: 10, y: 70 }, { x: 70, y: 70 }
            ];

            positions.forEach((pos, i) => {
                const bfly = document.createElement('div');
                bfly.className = 'butterfly';
                const size = 30 + Math.random() * 20;
                bfly.style.width = size + 'px';
                bfly.style.height = size + 'px';
                bfly.style.left = pos.x + '%';
                bfly.style.top = pos.y + '%';
                bfly.style.animationDelay = (Math.random() * 2) + 's';
                bfly.style.zIndex = 25 + Math.floor(Math.random() * 5);
                butterflyContainer.appendChild(bfly);

                // Animate position
                const startX = pos.x;
                const startY = pos.y;
                let angle = Math.random() * Math.PI * 2;
                let phase = Math.random() * Math.PI * 2;

                function animateButterfly() {
                    if (!isOpen) return;
                    angle += 0.003;
                    const floatY = Math.sin(Date.now() * 0.001 + phase) * 4;
                    const floatX = Math.cos(Date.now() * 0.0008 + phase) * 3;
                    const cx = startX + Math.sin(angle) * 10 + floatX;
                    const cy = startY + Math.cos(angle * 0.7) * 8 + floatY;
                    bfly.style.left = cx + '%';
                    bfly.style.top = cy + '%';
                    requestAnimationFrame(animateButterfly);
                }

                setTimeout(() => {
                    bfly.classList.add('show');
                    if (isOpen) animateButterfly();
                }, 1500 + i * 200);
            });
        }

        // =============================================
        // MAGIC STARS FROM LETTER
        // =============================================
        function createMagicStars() {
            const letter = document.getElementById('letter');
            const rect = letter.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.className = 'magic-star';
                star.style.left = centerX + 'px';
                star.style.top = centerY + 'px';
                
                // Random direction from center to edges
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 200;
                const sx = Math.cos(angle) * distance;
                const sy = Math.sin(angle) * distance;
                
                star.style.setProperty('--sx', sx + 'px');
                star.style.setProperty('--sy', sy + 'px');
                star.style.animationDelay = (Math.random() * 0.5) + 's';
                star.style.animationDuration = (1.5 + Math.random() * 1) + 's';
                
                magicStarsContainer.appendChild(star);
                setTimeout(() => star.remove(), 3000);
            }
        }

        // =============================================
        // PARTICLE BURST
        // =============================================
        function launchParticleBurst() {
            const rect = envelope.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height * 0.4;
            const colors = ['#ffd700', '#ffec8b', '#c9a84c', '#fff8dc', '#ffdab9', '#ffe4b5', '#fffacd'];

            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.className = 'burst-particle';
                const size = 2 + Math.random() * 6;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                p.style.boxShadow = `0 0 ${4 + Math.random() * 8}px ${p.style.background}`;

                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 200;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 50 - Math.random() * 100;
                p.style.setProperty('--tx', tx + 'px');
                p.style.setProperty('--ty', ty + 'px');
                p.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
                p.style.animationDelay = (Math.random() * 0.4) + 's';

                burstContainer.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }
        }

        // =============================================
        // FAIRY DUST
        // =============================================
        function createFairyDust() {
            const fairy = document.querySelector('.fairy');
            if (!fairy) return;
            setInterval(() => {
                if (!isOpen) return;
                const rect = fairy.getBoundingClientRect();
                const dust = document.createElement('div');
                dust.className = 'fairy-dust';
                dust.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 20) + 'px';
                dust.style.top = (rect.top + rect.height - 5) + 'px';
                dust.style.width = dust.style.height = (2 + Math.random() * 3) + 'px';
                document.body.appendChild(dust);
                setTimeout(() => dust.remove(), 1500);
            }, 300);
        }

        // =============================================
        // OPEN ENVELOPE
        // =============================================
        envelope.addEventListener('click', () => {
            if (isOpen) return;
            openEnvelope();
        });

        function openEnvelope() {
            isOpen = true;
            
            // Start music automatically
            if (!isMusicPlaying) {
                bgMusic.play();
                isMusicPlaying = true;
                musicBtn.textContent = '♫';
            }

            envelope.classList.add('open');
            container.classList.add('open');
            letterWrapper.classList.add('show');
            hint.classList.add('hidden');
            
            // Debug: check if image loads
            const img = document.querySelector('#letter img');
            if (img) {
                console.log('Image src:', img.src);
                img.onload = () => console.log('Image loaded successfully');
                img.onerror = () => console.error('Image failed to load');
            }
            
            // Launch effects
            setTimeout(() => launchParticleBurst(), 200);
            setTimeout(() => launchParticleBurst(), 600);
            setTimeout(() => launchParticleBurst(), 1000);
            
            setTimeout(() => {
                resetBtn.classList.add('visible');
                createButterflies();
                createMagicStars();
                fairyContainer.classList.add('show');
                createFairyDust();
                document.getElementById('whatsappBtn').classList.add('visible');
                document.getElementById('mapsBtn').classList.add('visible');
            }, 1500);
        }

        // =============================================
        // RESET
        // =============================================
        resetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isOpen = false;
            envelope.classList.remove('open');
            container.classList.remove('open');
            hint.classList.remove('hidden');
            resetBtn.classList.remove('visible');
            fairyContainer.classList.remove('show');
            
            // Remove butterflies
            butterflyContainer.innerHTML = '';
            
            // Remove burst particles
            burstContainer.innerHTML = '';
        });

        // =============================================
        // PREVENT SCROLL ON MOBILE
        // =============================================
        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('.container')) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
